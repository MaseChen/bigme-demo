bigmi_activate_esports_mode:
  alias: Bigmi Activate Esports Mode
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.bigmi_rental_mode
          - input_boolean.bigmi_cinema_mode
    - action: input_boolean.turn_on
      target:
        entity_id:
          - input_boolean.bigmi_pc_power
          - input_boolean.bigmi_ambient_strip
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.bigmi_projector_power
          - input_boolean.bigmi_guest_welcome
    - action: input_select.select_option
      target:
        entity_id: input_select.bigmi_primary_ecosystem
      data:
        option: Matter
    - action: input_text.set_value
      target:
        entity_id: input_text.bigmi_last_runtime_action
      data:
        value: Esports mode activated from script

bigmi_deactivate_esports_mode:
  alias: Bigmi Deactivate Esports Mode
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.bigmi_pc_power
          - input_boolean.bigmi_ambient_strip
    - action: input_text.set_value
      target:
        entity_id: input_text.bigmi_last_runtime_action
      data:
        value: Esports mode deactivated

