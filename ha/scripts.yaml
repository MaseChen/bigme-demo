bigmi_fire_runtime_demo_event:
  alias: Bigmi Fire Runtime Demo Event
  sequence:
    - event: bigmi_activate_scene
      event_data:
        mode: esports
        source: dashboard-event
        note: Manual event fired from the Bigmi Studio Console
        payload:
          trigger: input_button.bigmi_fire_runtime_event
          channel: custom-event

bigmi_trigger_local_webhook_demo:
  alias: Bigmi Trigger Local Webhook Demo
  sequence:
    - action: rest_command.bigmi_demo_scene_webhook

bigmi_run_owner_arrives_home_program:
  alias: Bigmi Run Owner Arrives Home Program
  sequence:
    - event: bigmi_run_house_program
      event_data:
        program: owner_arrives_home
        source: apartment-dashboard
        note: Owner tapped the arrive home button from the apartment demo

