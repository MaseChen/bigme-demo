title: Bigmi
views:
  - title: Home
    path: home
    icon: mdi:home-city-outline
    cards:
      - type: picture
        image: /local/bigmi-stage.svg
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # Bigmi
          Bigmi is presented here as a programmable automation layer for smart homes and small smart spaces.

          This frontstage view is intentionally product-first:
          - launch room-scale experiences
          - install reusable packs
          - monitor safety posture
          - keep the developer tooling one layer behind the scenes

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.bigmi_connected_ecosystems
            name: Ecosystems
            min: 0
            max: 3
            severity:
              red: 0
              yellow: 2
              green: 3
          - type: gauge
            entity: sensor.bigmi_installed_pack_count
            name: Installed Packs
            min: 0
            max: 6
            severity:
              red: 1
              yellow: 3
              green: 5
          - type: gauge
            entity: sensor.bigmi_approval_queue
            name: Safety Queue
            min: 0
            max: 1
            severity:
              green: 0
              red: 1

      - type: grid
        title: Quick Launch
        columns: 4
        square: false
        cards:
          - type: button
            name: Arrive Home
            icon: mdi:home-import-outline
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_owner_arrives_home_program
          - type: button
            name: Rental Check-in
            icon: mdi:key-variant
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_rental_checkin_mode
          - type: button
            name: Quiet Night
            icon: mdi:weather-night
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_quiet_night_mode
          - type: button
            name: Open Marketplace
            icon: mdi:storefront-outline
            tap_action:
              action: navigate
              navigation_path: /bigmi-console/marketplace

      - type: entities
        title: Platform Snapshot
        show_header_toggle: false
        entities:
          - entity: sensor.bigmi_runtime_status
            name: Runtime Status
          - entity: input_select.bigmi_primary_ecosystem
            name: Primary Ecosystem
          - entity: alarm_control_panel.bigmi_space_guard
            name: Space Guard
          - entity: sensor.bigmi_installed_pack_count
            name: Installed Pack Count
          - entity: input_text.bigmi_house_program_status
            name: Current Space Program

      - type: grid
        title: Signature Experiences
        columns: 3
        square: false
        cards:
          - type: tile
            entity: input_boolean.bigmi_esports_mode
            name: Esports Arena
            icon: mdi:controller
            color: cyan
            vertical: true
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.bigmi_rental_mode
            name: Rental Host
            icon: mdi:home-account
            color: amber
            vertical: true
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.bigmi_cinema_mode
            name: Cinema Room
            icon: mdi:projector-screen
            color: orange
            vertical: true
            tap_action:
              action: toggle

  - title: Spaces
    path: spaces
    icon: mdi:floor-plan
    cards:
      - type: markdown
        content: |
          # Space Programs
          The apartment is treated as a programmable object instead of a bag of disconnected devices.

          Each button below launches a room-aware sequence that advanced users can later modify in Python.

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.bigmi_active_apartment_devices
            name: Active Devices
            min: 0
            max: 25
            severity:
              green: 6
              yellow: 14
              red: 20
          - type: gauge
            entity: sensor.bigmi_local_roundtrip_latency
            name: Local Latency
            min: 0
            max: 100
            severity:
              green: 20
              yellow: 45
              red: 75

      - type: grid
        title: Scenario Library
        columns: 3
        square: false
        cards:
          - type: button
            name: Owner Arrives Home
            icon: mdi:home-import-outline
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_owner_arrives_home_program
          - type: button
            name: Elder Care
            icon: mdi:human-cane
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_elder_care_mode
          - type: button
            name: Energy Saver
            icon: mdi:leaf
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_energy_saver_mode
          - type: button
            name: Pet Mode
            icon: mdi:paw
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_pet_mode
          - type: button
            name: Rental Check-in
            icon: mdi:key-variant
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_rental_checkin_mode
          - type: button
            name: Esports Room
            icon: mdi:controller
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_esports_room_mode
          - type: button
            name: Cinema Room
            icon: mdi:projector-screen
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_cinema_room_mode
          - type: button
            name: Quiet Night
            icon: mdi:weather-night
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_quiet_night_mode
          - type: button
            name: Work From Home
            icon: mdi:laptop
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_work_from_home_mode

      - type: horizontal-stack
        cards:
          - type: button
            name: Reset Apartment
            icon: mdi:restore
            tap_action:
              action: perform-action
              perform_action: script.bigmi_reset_apartment_demo
          - type: button
            name: Open Developer Console
            icon: mdi:console-network
            tap_action:
              action: navigate
              navigation_path: /bigmi-console/developer

      - type: entities
        title: Program Snapshot
        show_header_toggle: false
        entities:
          - entity: input_text.bigmi_house_program_status
            name: Program Status
          - entity: input_text.bigmi_last_room_touched
            name: Last Room Touched

      - type: grid
        title: Room Highlights
        columns: 3
        square: false
        cards:
          - type: tile
            entity: input_boolean.bigmi_entryway_light
            name: Entryway Light
            icon: mdi:lightbulb
            color: amber
          - type: tile
            entity: input_boolean.bigmi_living_room_curtain
            name: Living Curtain
            icon: mdi:curtains
            color: blue
          - type: tile
            entity: input_boolean.bigmi_living_room_ac
            name: Living AC
            icon: mdi:air-conditioner
            color: cyan
          - type: tile
            entity: input_boolean.bigmi_kitchen_pendant_light
            name: Kitchen Pendant
            icon: mdi:lightbulb-group
            color: amber
          - type: tile
            entity: input_boolean.bigmi_bedroom_air_purifier
            name: Bedroom Air
            icon: mdi:air-purifier
            color: teal
          - type: tile
            entity: input_boolean.bigmi_bathroom_water_heater
            name: Water Heater
            icon: mdi:water-boiler
            color: red
          - type: tile
            entity: input_boolean.bigmi_study_monitor
            name: Study Monitor
            icon: mdi:monitor
            color: cyan
          - type: tile
            entity: input_boolean.bigmi_doorbell_mute
            name: Doorbell Mute
            icon: mdi:bell-off
            color: amber
          - type: tile
            entity: input_boolean.bigmi_medication_reminder
            name: Care Reminder
            icon: mdi:pill
            color: orange

  - title: Marketplace
    path: marketplace
    icon: mdi:storefront-outline
    cards:
      - type: picture
        image: /local/bigmi-marketplace-stage.svg
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # Bigmi Marketplace
          This is a Bigmi-styled frontstage shell for reusable automation packs.

          The presentation layer is product-first. The implementation layer still rides on `Blueprints` and `HACS` so we can move faster.

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.bigmi_installed_pack_count
            name: Installed Packs
            min: 0
            max: 6
            severity:
              red: 1
              yellow: 3
              green: 5
          - type: gauge
            entity: sensor.bigmi_template_catalog_size
            name: Template Catalog
            min: 0
            max: 20
            severity:
              red: 2
              yellow: 6
              green: 10

      - type: entities
        title: Marketplace Status
        show_header_toggle: false
        entities:
          - entity: input_text.bigmi_marketplace_last_install
            name: Last Install Event
          - entity: input_boolean.bigmi_pack_rental_host_installed
            name: Rental Host Pack
          - entity: input_boolean.bigmi_pack_quiet_night_installed
            name: Quiet Night Pack
          - entity: input_boolean.bigmi_pack_esports_installed
            name: Esports Pack

      - type: grid
        title: Featured Packs
        columns: 3
        square: false
        cards:
          - type: tile
            entity: input_boolean.bigmi_pack_elder_care_installed
            name: Elder Care Pack
            icon: mdi:package-variant-closed
            color: teal
          - type: tile
            entity: input_boolean.bigmi_pack_rental_host_installed
            name: Rental Ops Pack
            icon: mdi:package-variant-closed
            color: amber
          - type: tile
            entity: input_boolean.bigmi_pack_quiet_night_installed
            name: Quiet Night Pack
            icon: mdi:package-variant-closed
            color: blue
          - type: tile
            entity: input_boolean.bigmi_pack_workday_installed
            name: Workday Pack
            icon: mdi:package-variant-closed
            color: green
          - type: tile
            entity: input_boolean.bigmi_pack_esports_installed
            name: Esports Pack
            icon: mdi:package-variant-closed
            color: cyan
          - type: tile
            entity: input_boolean.bigmi_pack_cinema_installed
            name: Cinema Pack
            icon: mdi:package-variant-closed
            color: orange

      - type: grid
        title: Install Featured Packs
        columns: 3
        square: false
        cards:
          - type: button
            name: Install Elder Care
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_elder_care_pack
          - type: button
            name: Install Rental Ops
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_rental_host_pack
          - type: button
            name: Install Quiet Night
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_quiet_night_pack
          - type: button
            name: Install Workday
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_workday_pack
          - type: button
            name: Install Esports
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_esports_pack
          - type: button
            name: Install Cinema
            icon: mdi:download
            tap_action:
              action: perform-action
              perform_action: script.bigmi_install_cinema_pack

      - type: grid
        title: Launch Installed Pack Demos
        columns: 3
        square: false
        cards:
          - type: button
            name: Launch Elder Care
            icon: mdi:human-cane
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_elder_care_mode
          - type: button
            name: Launch Rental Check-in
            icon: mdi:key-variant
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_rental_checkin_mode
          - type: button
            name: Launch Quiet Night
            icon: mdi:weather-night
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_quiet_night_mode
          - type: button
            name: Launch Workday
            icon: mdi:laptop
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_work_from_home_mode
          - type: button
            name: Launch Esports
            icon: mdi:controller
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_esports_room_mode
          - type: button
            name: Launch Cinema
            icon: mdi:projector-screen
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_cinema_room_mode

  - title: Security
    path: security
    icon: mdi:shield-lock-outline
    cards:
      - type: picture
        image: /local/bigmi-security-stage.svg
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # Security Center
          This view reframes safety as a product feature instead of a raw automation detail.

          Today it is powered by Bigmi's approval flow plus a manual `Space Guard` alarm posture.
          For later demos, this is the cleanest place to upgrade into `Alarmo` without changing the story.

      - type: alarm-panel
        entity: alarm_control_panel.bigmi_space_guard
        name: Bigmi Space Guard
        states:
          - arm_home
          - arm_away
          - arm_night

      - type: entities
        title: Guard Status
        show_header_toggle: false
        entities:
          - entity: input_boolean.bigmi_safety_guard
            name: High Privilege Guard
          - entity: input_boolean.bigmi_sensitive_unlock_pending
            name: Unlock Pending
          - entity: input_boolean.bigmi_admin_approval
            name: Manual Approval
          - entity: input_boolean.bigmi_smart_lock
            name: Smart Lock Override
          - entity: input_text.bigmi_last_runtime_action
            name: Latest Safety Action

      - type: grid
        title: Safety Demo Controls
        columns: 3
        square: false
        cards:
          - type: button
            name: Request Unlock
            icon: mdi:lock-question
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.bigmi_request_sensitive_unlock
          - type: button
            name: Approve Unlock
            icon: mdi:shield-check
            entity: input_boolean.bigmi_admin_approval
            tap_action:
              action: toggle
          - type: button
            name: Trigger Breach
            icon: mdi:alarm-light
            tap_action:
              action: perform-action
              perform_action: script.bigmi_trigger_space_guard_demo
          - type: button
            name: Arm Stay
            icon: mdi:shield-home
            tap_action:
              action: perform-action
              perform_action: script.bigmi_arm_space_guard_home
          - type: button
            name: Arm Away
            icon: mdi:shield-airplane
            tap_action:
              action: perform-action
              perform_action: script.bigmi_arm_space_guard_away
          - type: button
            name: Disarm
            icon: mdi:shield-off
            tap_action:
              action: perform-action
              perform_action: script.bigmi_disarm_space_guard

      - type: markdown
        content: |
          **Presentation note**

          - Use `Request Unlock` to show secondary approval.
          - Use `Trigger Breach` to show a security posture change.
          - Open the trace later from `Automations & scenes` when you want the colorful execution graph.

  - title: Developer
    path: developer
    icon: mdi:console-network
    cards:
      - type: picture
        image: /local/bigmi-flow-stage.svg
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # Developer Console
          This backstage view keeps the engineering proof visible without cluttering the product frontstage.

          Programming surfaces wired into the same Bigmi runtime:
          - Python AppDaemon runtime
          - Blueprint template launcher
          - Webhook entry point
          - Node-RED visual flow editor
          - programmable apartment event engine

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.bigmi_programmable_entry_points
            name: Entry Points
            min: 0
            max: 6
            severity:
              red: 1
              yellow: 3
              green: 5
          - type: gauge
            entity: sensor.bigmi_template_catalog_size
            name: Template Packs
            min: 0
            max: 20
            severity:
              red: 2
              yellow: 6
              green: 10
          - type: gauge
            entity: sensor.bigmi_active_experience_count
            name: Active Modes
            min: 0
            max: 3
            severity:
              green: 1
              yellow: 2
              red: 3

      - type: entities
        title: Runtime Audit Feed
        show_header_toggle: false
        entities:
          - entity: input_text.bigmi_last_runtime_action
            name: Last Runtime Action
          - entity: input_text.bigmi_last_runtime_channel
            name: Last Runtime Channel
          - entity: input_text.bigmi_last_program_payload
            name: Last Program Payload
          - entity: sensor.bigmi_runtime_status
            name: Runtime Status
          - entity: input_text.bigmi_marketplace_last_install
            name: Last Marketplace Install

      - type: grid
        title: Trigger Matrix
        columns: 4
        square: false
        cards:
          - type: button
            name: Fire Runtime Event
            icon: mdi:code-json
            tap_action:
              action: perform-action
              perform_action: script.bigmi_fire_runtime_demo_event
          - type: button
            name: Run Blueprint Demo
            icon: mdi:store-cog
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.bigmi_blueprint_launch_rental
          - type: button
            name: Run Mode Webhook
            icon: mdi:api
            tap_action:
              action: perform-action
              perform_action: script.bigmi_trigger_local_webhook_demo
          - type: button
            name: Run House Webhook
            icon: mdi:home-switch-outline
            tap_action:
              action: perform-action
              perform_action: script.bigmi_trigger_local_house_program_webhook

      - type: markdown
        content: |
          ## Visual Flow Studio

          - Node-RED editor: [http://localhost:1880](http://localhost:1880)
          - AppDaemon admin: [http://localhost:5050](http://localhost:5050)

          The bundled Node-RED flow uses local webhooks to launch:
          - `rental` and `cinema` experience modes
          - `owner_arrives_home` and `quiet_night_mode` apartment programs

      - type: history-graph
        title: Developer Timeline
        hours_to_show: 2
        refresh_interval: 15
        entities:
          - entity: input_boolean.bigmi_esports_mode
          - entity: input_boolean.bigmi_rental_mode
          - entity: input_boolean.bigmi_cinema_mode
          - entity: input_boolean.bigmi_sensitive_unlock_pending
