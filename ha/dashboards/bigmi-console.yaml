title: Bigmi
views:
  - title: Home
    path: home
    icon: mdi:home-city-outline
    cards:
      - type: markdown
        content: |
          # Bigmi
          Bigmi is presented here as a programmable automation layer for smart homes and small smart spaces.

          This frontstage view is intentionally product-first:
          - launch room-scale experiences
          - install reusable packs
          - monitor safety posture
          - keep the developer tooling one layer behind the scenes

      - type: markdown
        content: |
          ## How to use
          1. Use **Quick Launch** for the shortest product demo.
          2. Open **Space Program** to show room-aware automation.
          3. Open **Marketplace** to show installable packs.
          4. Open **Security** to show approvals and guard posture.
          5. Open **Developer** only when you want to reveal the runtime underneath.

      - type: grid
        title: Platform Metrics
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.bigmi_connected_ecosystems
            name: Ecosystems
            min: 0
            max: 3
            severity:
              red: 0
              yellow: 2
              green: 3
          - type: gauge
            entity: sensor.bigmi_installed_pack_count
            name: Installed Packs
            min: 0
            max: 6
            severity:
              red: 1
              yellow: 3
              green: 5
          - type: gauge
            entity: sensor.bigmi_approval_queue
            name: Safety Queue
            min: 0
            max: 1
            severity:
              green: 0
              red: 1

      - type: grid
        title: Quick Launch
        columns: 2
        square: false
        cards:
          - type: button
            name: Arrive Home
            icon: mdi:home-import-outline
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_owner_arrives_home_program
          - type: button
            name: Rental Check-in
            icon: mdi:key-variant
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_rental_checkin_mode
          - type: button
            name: Quiet Night
            icon: mdi:weather-night
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_quiet_night_mode
          - type: button
            name: Open Marketplace
            icon: mdi:storefront-outline
            tap_action:
              action: navigate
              navigation_path: /bigmi-console/marketplace

      - type: entities
        title: Platform Snapshot
        show_header_toggle: false
        entities:
          - entity: sensor.bigmi_runtime_status
            name: Runtime Status
          - entity: input_select.bigmi_primary_ecosystem
            name: Primary Ecosystem
          - entity: alarm_control_panel.bigmi_space_guard
            name: Space Guard
          - entity: sensor.bigmi_installed_pack_count
            name: Installed Pack Count
          - entity: input_text.bigmi_house_program_status
            name: Current Space Program

      - type: grid
        title: Signature Experiences
        columns: 2
        square: false
        cards:
          - type: tile
            entity: input_boolean.bigmi_esports_mode
            name: Esports Arena
            icon: mdi:controller
            color: cyan
            vertical: true
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.bigmi_rental_mode
            name: Rental Host
            icon: mdi:home-account
            color: amber
            vertical: true
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.bigmi_cinema_mode
            name: Cinema Room
            icon: mdi:projector-screen
            color: orange
            vertical: true
            tap_action:
              action: toggle

  - title: Space Program
    path: space-program
    icon: mdi:floor-plan
    cards:
      - type: markdown
        content: |
          # Space Program
          The apartment is treated as a programmable object instead of a bag of disconnected devices.

          Each button below launches a room-aware sequence that advanced users can later modify in Python.

      - type: markdown
        content: |
          ## How to use
          1. Click **Reset Apartment** before a fresh recording.
          2. Launch one scenario from **Scenario Library**.
          3. Watch the room state cards update in sequence.
          4. Repeat with a second scenario to show the same space can host many programs.

      - type: grid
        title: Program Metrics
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.bigmi_active_apartment_devices
            name: Active Devices
            min: 0
            max: 25
            severity:
              green: 6
              yellow: 14
              red: 20
          - type: gauge
            entity: sensor.bigmi_local_roundtrip_latency
            name: Local Latency
            min: 0
            max: 100
            severity:
              green: 20
              yellow: 45
              red: 75

      - type: grid
        title: Scenario Library
        columns: 2
        square: false
        cards:
          - type: button
            name: Owner Arrives Home
            icon: mdi:home-import-outline
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_owner_arrives_home_program
          - type: button
            name: Elder Care
            icon: mdi:human-cane
            tap_action:
              action: perform-action
              perform_action: script.bigmi_run_elder_care_mode
          - type: button
